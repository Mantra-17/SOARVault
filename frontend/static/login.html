<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — SOAR Console</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-body">

  <div class="login-card">
    <div class="brand brand-center">
      <span class="brand-mark">◈</span>
      <div class="brand-text">
        <strong>SOAR Console</strong>
        <span>Incident Containment Engine</span>
      </div>
    </div>

    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="asha.soc or rohit.eng" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="demo123" autocomplete="current-password" required />

      <button type="submit" id="login-btn">Sign in</button>
      <p id="login-error" class="login-error"></p>
    </form>

    <div class="login-hint">
      <p>Demo accounts</p>
      <code>asha.soc / demo123</code> — SOC Analyst<br />
      <code>rohit.eng / demo123</code> — Security Engineer
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
